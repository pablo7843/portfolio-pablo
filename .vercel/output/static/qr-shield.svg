<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#080c14"/>
  <!-- Background glow -->
  <defs>
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3ECF8E" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="qrGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#02569B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="0"/>
    </radialGradient>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <ellipse cx="400" cy="200" rx="300" ry="180" fill="url(#shieldGlow)"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="36" fill="#040810"/>
  <circle cx="20" cy="18" r="6" fill="#ff4444" opacity="0.8"/>
  <circle cx="42" cy="18" r="6" fill="#ffaa00" opacity="0.8"/>
  <circle cx="64" cy="18" r="6" fill="#3ECF8E" opacity="0.9"/>
  <text x="400" y="23" font-family="'Courier New', monospace" font-size="12" fill="#3ECF8E" text-anchor="middle" opacity="0.8">QR-SHIELD :: SECURE_SCAN_INITIALIZED</text>

  <!-- QR code pattern (left side, artistic) -->
  <!-- Top-left finder pattern -->
  <rect x="80" y="70" width="90" height="90" rx="4" fill="none" stroke="#02569B" stroke-width="2" opacity="0.5"/>
  <rect x="92" y="82" width="66" height="66" rx="2" fill="#02569B" opacity="0.2"/>
  <rect x="104" y="94" width="42" height="42" rx="1" fill="#02569B" opacity="0.5"/>
  <!-- Top-right finder -->
  <rect x="200" y="70" width="90" height="90" rx="4" fill="none" stroke="#02569B" stroke-width="2" opacity="0.5"/>
  <rect x="212" y="82" width="66" height="66" rx="2" fill="#02569B" opacity="0.2"/>
  <rect x="224" y="94" width="42" height="42" rx="1" fill="#02569B" opacity="0.5"/>
  <!-- Bottom-left finder -->
  <rect x="80" y="200" width="90" height="90" rx="4" fill="none" stroke="#02569B" stroke-width="2" opacity="0.5"/>
  <rect x="92" y="212" width="66" height="66" rx="2" fill="#02569B" opacity="0.2"/>
  <rect x="104" y="224" width="42" height="42" rx="1" fill="#02569B" opacity="0.5"/>
  <!-- Data modules (decorative small squares) -->
  <rect x="200" y="200" width="14" height="14" fill="#02569B" opacity="0.5"/>
  <rect x="220" y="200" width="14" height="14" fill="#02569B" opacity="0.3"/>
  <rect x="240" y="200" width="14" height="14" fill="#02569B" opacity="0.5"/>
  <rect x="260" y="200" width="14" height="14" fill="#02569B" opacity="0.2"/>
  <rect x="200" y="220" width="14" height="14" fill="#02569B" opacity="0.2"/>
  <rect x="220" y="220" width="14" height="14" fill="#02569B" opacity="0.5"/>
  <rect x="260" y="220" width="14" height="14" fill="#02569B" opacity="0.4"/>
  <rect x="200" y="240" width="14" height="14" fill="#02569B" opacity="0.4"/>
  <rect x="240" y="240" width="14" height="14" fill="#02569B" opacity="0.5"/>
  <rect x="260" y="240" width="14" height="14" fill="#02569B" opacity="0.3"/>
  <rect x="200" y="260" width="14" height="14" fill="#02569B" opacity="0.5"/>
  <rect x="220" y="260" width="14" height="14" fill="#02569B" opacity="0.3"/>
  <rect x="240" y="260" width="14" height="14" fill="#02569B" opacity="0.2"/>
  <rect x="260" y="260" width="14" height="14" fill="#02569B" opacity="0.5"/>

  <!-- Shield (center/right) -->
  <path d="M 500 60 L 620 60 L 620 100 Q 620 200 560 250 Q 500 200 500 100 Z" fill="#3ECF8E" fill-opacity="0.08" stroke="#3ECF8E" stroke-width="2" stroke-opacity="0.6" filter="url(#greenGlow)"/>
  <!-- Shield inner glow band -->
  <path d="M 515 80 L 605 80 L 605 108 Q 605 190 560 232 Q 515 190 515 108 Z" fill="#3ECF8E" fill-opacity="0.05" stroke="#3ECF8E" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Lock icon inside shield -->
  <rect x="537" y="148" width="46" height="36" rx="4" fill="#3ECF8E" fill-opacity="0.2" stroke="#3ECF8E" stroke-width="1.5"/>
  <path d="M 549 148 L 549 136 Q 549 122 560 122 Q 571 122 571 136 L 571 148" fill="none" stroke="#3ECF8E" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="560" cy="163" r="5" fill="#3ECF8E" opacity="0.9"/>
  <line x1="560" y1="168" x2="560" y2="175" stroke="#3ECF8E" stroke-width="2" opacity="0.9"/>

  <!-- Title -->
  <text x="560" y="300" font-family="'Courier New', monospace" font-size="32" font-weight="bold" fill="#3ECF8E" text-anchor="middle" filter="url(#greenGlow)" letter-spacing="3">QR-Shield</text>
  <!-- Subtitle -->
  <text x="560" y="328" font-family="'Courier New', monospace" font-size="12" fill="#02569B" text-anchor="middle" opacity="0.9" letter-spacing="3">SCAN · VERIFY · PROTECT</text>

  <!-- Status badges -->
  <rect x="350" y="345" width="80" height="22" rx="2" fill="#3ECF8E" fill-opacity="0.1" stroke="#3ECF8E" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="390" y="361" font-family="'Courier New', monospace" font-size="10" fill="#3ECF8E" text-anchor="middle" opacity="0.8">● SAFE</text>
  <rect x="444" y="345" width="95" height="22" rx="2" fill="#ffaa00" fill-opacity="0.1" stroke="#ffaa00" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="491" y="361" font-family="'Courier New', monospace" font-size="10" fill="#ffaa00" text-anchor="middle" opacity="0.8">◆ SUSPECT</text>
  <rect x="553" y="345" width="80" height="22" rx="2" fill="#ff4444" fill-opacity="0.1" stroke="#ff4444" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="593" y="361" font-family="'Courier New', monospace" font-size="10" fill="#ff4444" text-anchor="middle" opacity="0.8">✕ DANGER</text>

  <!-- Footer -->
  <text x="400" y="390" font-family="'Courier New', monospace" font-size="10" fill="#3ECF8E" text-anchor="middle" opacity="0.35">[ FLUTTER · SUPABASE · DART ]</text>
</svg>
