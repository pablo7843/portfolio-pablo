<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#080808"/>
  <!-- Grid lines -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="#00ff00" stroke-width="0.3" opacity="0.12"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="#00ff00" stroke-width="0.3" opacity="0.12"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#00ff00" stroke-width="0.3" opacity="0.12"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#00ff00" stroke-width="0.3" opacity="0.12"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="#00ff00" stroke-width="0.3" opacity="0.12"/>
  <line x1="400" y1="0" x2="400" y2="400" stroke="#00ff00" stroke-width="0.3" opacity="0.12"/>
  <line x1="600" y1="0" x2="600" y2="400" stroke="#00ff00" stroke-width="0.3" opacity="0.12"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="36" fill="#001100"/>
  <rect x="0" y="0" width="800" height="36" fill="#00ff00" opacity="0.06"/>
  <circle cx="20" cy="18" r="6" fill="#ff4444" opacity="0.8"/>
  <circle cx="42" cy="18" r="6" fill="#ffaa00" opacity="0.8"/>
  <circle cx="64" cy="18" r="6" fill="#00ff00" opacity="0.8"/>
  <text x="400" y="23" font-family="'Courier New', monospace" font-size="13" fill="#00ff00" text-anchor="middle" opacity="0.9">SECURITY_MONITOR_INITIALIZED :: STATUS=ACTIVE</text>
  <!-- Shield icon area -->
  <defs>
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <ellipse cx="400" cy="210" rx="200" ry="130" fill="url(#shieldGlow)"/>
  <!-- Main title -->
  <text x="400" y="185" font-family="'Courier New', monospace" font-size="64" font-weight="bold" fill="#00ff00" text-anchor="middle" letter-spacing="6" filter="url(#greenGlow)" opacity="0.95">SecDash</text>
  <!-- Subtitle -->
  <text x="400" y="222" font-family="'Courier New', monospace" font-size="13" fill="#00cc00" text-anchor="middle" opacity="0.8">> THREAT_INTELLIGENCE_DASHBOARD</text>
  <!-- Status line -->
  <rect x="120" y="248" width="560" height="1" fill="#00ff00" opacity="0.25"/>
  <!-- Info tags -->
  <rect x="166" y="262" width="130" height="24" rx="2" fill="#00ff00" fill-opacity="0.08" stroke="#00ff00" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="231" y="279" font-family="'Courier New', monospace" font-size="11" fill="#00ff00" text-anchor="middle" opacity="0.85">VirusTotal 70+</text>
  <rect x="310" y="262" width="110" height="24" rx="2" fill="#00ff00" fill-opacity="0.08" stroke="#00ff00" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="365" y="279" font-family="'Courier New', monospace" font-size="11" fill="#00ff00" text-anchor="middle" opacity="0.85">AbuseIPDB</text>
  <rect x="434" y="262" width="100" height="24" rx="2" fill="#00ff00" fill-opacity="0.08" stroke="#00ff00" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="484" y="279" font-family="'Courier New', monospace" font-size="11" fill="#00ff00" text-anchor="middle" opacity="0.85">Docker</text>
  <!-- Footer -->
  <text x="400" y="340" font-family="'Courier New', monospace" font-size="11" fill="#00ff00" text-anchor="middle" opacity="0.4">[ NODE.JS · EXPRESS · DOCKER · VIRUSTOTAL API · ABUSEIPDB ]</text>
</svg>
