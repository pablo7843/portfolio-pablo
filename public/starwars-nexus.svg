<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0a0e27"/>
  <!-- Stars -->
  <circle cx="45" cy="30" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="120" cy="65" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="200" cy="20" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="310" cy="50" r="1" fill="white" opacity="0.7"/>
  <circle cx="390" cy="15" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="480" cy="40" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="570" cy="25" r="1.4" fill="white" opacity="0.85"/>
  <circle cx="650" cy="60" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="740" cy="30" r="1.1" fill="white" opacity="0.9"/>
  <circle cx="75" cy="100" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="160" cy="130" r="1.3" fill="white" opacity="0.75"/>
  <circle cx="260" cy="85" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="350" cy="120" r="1" fill="white" opacity="0.8"/>
  <circle cx="430" cy="90" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="530" cy="110" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="620" cy="95" r="1.2" fill="white" opacity="0.75"/>
  <circle cx="710" cy="115" r="0.9" fill="white" opacity="0.7"/>
  <circle cx="30" cy="340" r="1" fill="white" opacity="0.6"/>
  <circle cx="90" cy="360" r="1.3" fill="white" opacity="0.8"/>
  <circle cx="180" cy="345" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="550" cy="355" r="1.1" fill="white" opacity="0.75"/>
  <circle cx="680" cy="340" r="0.9" fill="white" opacity="0.65"/>
  <circle cx="760" cy="370" r="1.4" fill="white" opacity="0.85"/>
  <!-- Glow circle center -->
  <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFD700" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#0a0e27" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="400" cy="200" rx="280" ry="160" fill="url(#centerGlow)"/>
  <!-- Lightsaber top blue -->
  <line x1="160" y1="155" x2="640" y2="155" stroke="#4285F4" stroke-width="1.5" opacity="0.4"/>
  <!-- "STAR WARS" title -->
  <text x="400" y="210" font-family="'Courier New', monospace" font-size="56" font-weight="bold" fill="#FFD700" text-anchor="middle" letter-spacing="8" filter="url(#glow)">STAR WARS</text>
  <!-- Subtitle -->
  <text x="400" y="248" font-family="'Courier New', monospace" font-size="22" fill="#7F52FF" text-anchor="middle" letter-spacing="16">N E X U S</text>
  <!-- Divider line -->
  <line x1="160" y1="268" x2="640" y2="268" stroke="#4285F4" stroke-width="1.5" opacity="0.4"/>
  <!-- Tag line -->
  <text x="400" y="300" font-family="'Courier New', monospace" font-size="12" fill="#00ff00" text-anchor="middle" opacity="0.7">[ KOTLIN · JETPACK COMPOSE · CLEAN ARCHITECTURE ]</text>
  <!-- Glow filter -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
