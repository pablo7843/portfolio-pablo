  <text x="400" y="23" font-family="'Courier New', monospace" font-size="13" fill="#009688" text-anchor="middle" opacity="0.9">SHRTN.IO :: URL_SHORTENER_SYSTEM v1.0</text>
  <!-- Glow -->
  <defs>
    <radialGradient id="tealGlow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#009688" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0f0a" stop-opacity="0"/>
    </radialGradient>
    <filter id="tealFilter">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <ellipse cx="400" cy="200" rx="340" ry="150" fill="url(#tealGlow)"/>
  <!-- URL input box -->
  <rect x="60" y="95" width="680" height="38" rx="3" fill="#0d1f1d" stroke="#009688" stroke-width="0.8" stroke-opacity="0.5"/>
