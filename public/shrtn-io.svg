  <text x="131" y="119" font-family="'Courier New', monospace" font-size="13" fill="#e0e0e0">very-long-example-domain.com/blog/articles/how-to-shorten-your-urls-effectively</text>
  <!-- Arrow -->
  <text x="390" y="174" font-family="'Courier New', monospace" font-size="22" fill="#009688" text-anchor="middle" filter="url(#tealFilter)" opacity="0.9">▼</text>
  <!-- Short URL output -->
  <rect x="200" y="185" width="400" height="52" rx="3" fill="#0d1f1d" stroke="#009688" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="400" y="218" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#00e5d1" text-anchor="middle" filter="url(#tealFilter)" letter-spacing="2">shrtn.io/x4k2</text>
  <!-- Stats bar -->
  <rect x="60" y="262" width="680" height="1" fill="#009688" opacity="0.2"/>
  <!-- Click stats bars -->
  <rect x="110" y="310" width="20" height="30" rx="1" fill="#009688" opacity="0.5"/>
  <rect x="140" y="298" width="20" height="42" rx="1" fill="#009688" opacity="0.6"/>
  <rect x="170" y="285" width="20" height="55" rx="1" fill="#009688" opacity="0.7"/>
  <rect x="200" y="278" width="20" height="62" rx="1" fill="#009688" opacity="0.75"/>
  <rect x="230" y="270" width="20" height="70" rx="1" fill="#009688" opacity="0.8"/>
  <rect x="260" y="262" width="20" height="78" rx="1" fill="#009688" opacity="0.9"/>
  <rect x="290" y="268" width="20" height="72" rx="1" fill="#009688" opacity="0.85"/>
  <text x="200" y="279" font-family="'Courier New', monospace" font-size="10" fill="#009688" opacity="0.5">CLICKS</text>
