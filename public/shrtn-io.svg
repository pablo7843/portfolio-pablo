<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0a0f0a"/>
  <!-- Grid lines -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="#009688" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="#009688" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#009688" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#009688" stroke-width="0.3" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="#009688" stroke-width="0.3" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="400" stroke="#009688" stroke-width="0.3" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="400" stroke="#009688" stroke-width="0.3" opacity="0.1"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="36" fill="#001a17"/>
  <rect x="0" y="0" width="800" height="36" fill="#009688" opacity="0.06"/>
