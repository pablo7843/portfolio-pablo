  <rect x="390" y="265" width="120" height="26" rx="2" fill="#009688" fill-opacity="0.1" stroke="#009688" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="450" y="282" font-family="'Courier New', monospace" font-size="11" fill="#009688" text-anchor="middle" opacity="0.85">JWT  AUTH</text>
  <rect x="524" y="265" width="120" height="26" rx="2" fill="#009688" fill-opacity="0.1" stroke="#009688" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="584" y="282" font-family="'Courier New', monospace" font-size="11" fill="#009688" text-anchor="middle" opacity="0.85">RATE LIMIT</text>
  <rect x="658" y="265" width="90" height="26" rx="2" fill="#009688" fill-opacity="0.1" stroke="#009688" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="703" y="282" font-family="'Courier New', monospace" font-size="11" fill="#009688" text-anchor="middle" opacity="0.85">bcrypt</text>
